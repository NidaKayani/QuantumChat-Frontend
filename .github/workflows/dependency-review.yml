name: Dependency Review

# GitHub's dependency-review-action requires Dependency graph (and GHAS on private
# repos). This workflow uses npm audit so PRs stay gated without org Advanced Security.
on:
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high+)
        run: npm audit --omit=dev --audit-level=high
